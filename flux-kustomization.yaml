apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kratix-platform
  namespace: flux-system
spec:
  interval: 1m
  prune: true # deletes cluster resources when removed from git
  sourceRef:
    kind: GitRepository
    name: promise-ci-cd-generated
  # Applies kustomization.yaml from the root of the generated-promises branch
  path: ./
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kratix-terraform-outputs
  namespace: flux-system
spec:
  interval: 1m
  prune: true # deletes cluster resources when removed from git
  sourceRef:
    kind: GitRepository
    name: promise-ci-cd
  # Applies resources written here by Kratix via the GitStateStore
  path: ./tf-resources
