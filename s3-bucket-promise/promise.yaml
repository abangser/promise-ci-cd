apiVersion: platform.kratix.io/v1alpha1
kind: Promise
metadata:
  creationTimestamp: null
  labels:
    kratix.io/promise-version: v0.0.1
  name: s3-bucket
  annotations:
    promise.kratix.io/version: 0.1.0
spec:
  api:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: s3buckets.example.kratix.io
    spec:
      group: example.kratix.io
      names:
        kind: S3Bucket
        plural: s3buckets
        singular: s3bucket
      scope: Namespaced
      versions:
        - name: v1alpha1
          schema:
            openAPIV3Schema:
              properties:
                spec:
                  default: {}
                  properties:
                    bucket_name:
                      default: ""
                      description: Globally unique name for the S3 bucket
                      type: string
                    environment:
                      default: dev
                      description: Deployment environment (e.g. dev, staging, production)
                      type: string
                    versioning_enabled:
                      default: false
                      description: Enable S3 object versioning
                      type: boolean
                  type: object
              type: object
          served: true
          storage: true
  destinationSelectors:
    - matchLabels:
        environment: terraform
  workflows:
    config: {}
    promise:
      configure:
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: dependencies
          spec:
            containers:
              - image: ghcr.io/abangser/promise-ci-cd/s3-bucket-dependencies:0.1.0
                name: add-tf-dependencies
    resource:
      configure:
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: instance-configure
          spec:
            containers:
              - env:
                  - name: MODULE_SOURCE
                    value: github.com/abangser/promise-ci-cd//terraform/s3-bucket?ref=main
                image: ghcr.io/syntasso/kratix-cli/terraform-generate:v0.6.0
                name: terraform-generate
status:
  workflows: 0
  workflowsFailed: 0
  workflowsSucceeded: 0
